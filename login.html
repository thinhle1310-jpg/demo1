<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <section class="auth" aria-label="Đăng nhập / Đăng ký">
    <header class="auth-header">
      <div class="auth-brand" aria-label="MiniShop">
        <span class="dot" aria-hidden="true"></span>
        <span>MiniShop</span>
      </div>
      <h1 class="auth-title" id="authTitle">Đăng nhập tài khoản</h1>
    </header>

    <div class="tabs" role="tablist" aria-label="Chọn chế độ">
      <button class="tab is-active" type="button" data-tab="login" role="tab" aria-selected="true">Đăng nhập</button>
      <button class="tab" type="button" data-tab="register" role="tab" aria-selected="false">Đăng ký</button>
    </div>

    <!-- LOGIN PANE -->
    <div data-pane="login" role="tabpanel">
      <form class="auth-form" id="loginForm" autocomplete="on">
        <label class="auth-label" for="loginUser">Email</label>
        <input class="auth-input" id="loginUser" type="email" placeholder="example@gmail.com" required />

        <label class="auth-label" for="loginPass">Mật khẩu</label>
        <div class="pass">
          <input class="auth-input" id="loginPass" type="password" placeholder="••••••" required />
          <button class="pass-toggle" type="button" id="toggleLoginPass" aria-label="Hiện/ẩn mật khẩu">👁</button>
        </div>

        <p class="auth-msg" id="msgLogin" aria-live="polite"></p>
        <button class="auth-btn" type="submit">Đăng nhập</button>
      </form>
    </div>

    <!-- REGISTER PANE -->
    <div data-pane="register" role="tabpanel" style="display:none">
      <form class="auth-form" id="regForm" autocomplete="on">
        <label class="auth-label" for="regName">Họ tên</label>
        <input class="auth-input" id="regName" type="text" placeholder="Nhập họ tên" required />

        <label class="auth-label" for="regEmail">Email</label>
        <input class="auth-input" id="regEmail" type="email" placeholder="example@gmail.com" required />

        <label class="auth-label" for="regPass">Mật khẩu</label>
        <div class="pass">
          <input class="auth-input" id="regPass" type="password" placeholder="Tối thiểu 6 ký tự" required />
          <button class="pass-toggle" type="button" id="toggleRegPass" aria-label="Hiện/ẩn mật khẩu">👁</button>
        </div>

        <p class="auth-msg" id="msgReg" aria-live="polite"></p>
        <button class="auth-btn" type="submit">Tạo tài khoản</button>
      </form>
    </div>

    <footer class="auth-footer">
      <button class="auth-close" id="btnClose" type="button">Đóng</button>
    </footer>
  </section>

  <script src="login.js"></script>
</body>
</html>
